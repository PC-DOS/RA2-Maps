 MND_bai_qiang_desc:0 "白承渊的侄子和养子。据说他曾经有一段不堪回首的经历，但若是在谈判桌上，坐在他对面的你只能感到深渊般的镇静，以及刺骨的寒意。\n\n\n\n\n\n\n\n£TFR_alus_ext_events_2\n\n\n\n\n"
