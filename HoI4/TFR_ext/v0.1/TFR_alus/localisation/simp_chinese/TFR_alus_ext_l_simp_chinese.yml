 SSA_alus_desc:0 "没有人（或者小马）知道她的过去是什么样的——有些传言说是至亲的惨死让她变成这样——但是这一切都和现在无关了。\n\n不要去打听，不要走进她的领土，不要尝试接近她。\n\n如果你执意向前，祝你好运。"
