 # Ideologies
 buddhism_ho_oh_ideology:0 "佛教化凤王主义"
 buddhism_ho_oh_ideology_desc:0 "凤王改信佛教后提出的新观点。与传统凤王主义相比，佛教化凤王主义在强调修身与修心的同时，更重视慈悲济世、菩萨行和众生平等，主张构建符合四圣谛、八正道，消除了五逆十恶、众生皆奉佛法的理想社会。同时，佛教化凤王主义秉承“一切有为法，如梦幻泡影”的理念，平等对待持有不同观点的一切有情众生。"
 traditional_ho_oh_ideology:0 "传统凤王主义"
 traditional_ho_oh_ideology_desc:0 "凤王主义在城都地区已流传上百年，由凤王在世间动荡时传授给民众。凤王主义的根本观点是人与精灵、人与自然的和谐相处。凤王主义重视自身的修行，以及与外部事物平等、安宁地相处。"
 classical_slavery:0 "古典奴隶制"
 classical_slavery_desc:0 "奴隶制首先是一种社会建构，体现为一个人对另一个人结构性的人身占有。这种占有包括能够切断奴隶的所有家庭联系，使其完全依附于主人。奴隶制与强迫劳动密切相关。强迫劳动是指个人通过武力、欺诈或胁迫等手段，违背他人意愿，要求他人提供工作或服务的行为。这种工作或服务通常是低薪水、无薪水，甚至负薪水的。"
 ultra_ecoharmony:0 "极端生态协和主义"
 ultra_ecoharmony_desc:0 "极端生态协和主义被认为是一种更温和的$ecofascism$和$econazism$。这一意识形态主张人口过剩是对环境的主要威胁，支持对移民、工业生产和资源开发进行严格的限制，但反对种族灭绝。然而，该意识形态提倡甚至推行原始主义的生活方式，这种生活方式的低生产力导致饥荒、疾病等无法避免，事实上产生了严重的人道主义危机。"
 ultra_ecoharmony_rayquaza:0 "$ultra_ecoharmony$"
 ultra_ecoharmony_rayquaza_desc:0 "$ultra_ecoharmony_desc$"
 ecofascism_kyogre:0 "$ecofascism$"
 ecofascism_kyogre_desc:0 "$ecofascism_desc$"
 econazism:0 "生态纳粹主义"
 econazism_desc:0 "生态纳粹主义指将环保主义与纳粹主义观点和策略相结合的意识形态。主张人口过剩是对环境的主要威胁，唯一的解决办法是完全停止移民，或者在最极端的情况下，积极对少数群体和族裔进行种族灭绝。"
 econazism_groudon:0 "$econazism$"
 econazism_groudon_desc:0 "$econazism_desc$"
