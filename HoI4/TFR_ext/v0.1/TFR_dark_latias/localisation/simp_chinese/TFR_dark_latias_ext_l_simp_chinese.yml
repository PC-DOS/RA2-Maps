 # Leaders
 VNT_dark_ypy_latias:0 "Y·P·Y·拉提亚斯"
 VNT_dark_ypy_latias_desc:0 "Y·P·Y·拉提亚斯曾经也想当一名优秀的水都守护神。但是对兄长的禁忌之恋让她难以自持。邪念趁虚而入，夺取了她的身体，操控她偷走心之水滴、激怒她的兄长。对当时的情况一无所知的兄长误以为一切是她自己所为，来自兄长的不解、愤怒与猜忌更是彻底断送了她最后的一丝自我意识。唯余贪嗔痴慢疑。五毒在六识中升腾，如炽焰酷烈，啮尽了年轻的守护神的一切，只剩下无限的执念和欲望。曾经纯净的心之水滴也被这样的心灵染成愈发深邃的黑，又因为守护神世代相传的力量而永葆完整。\n\n无时无刻都将黑浊的心之水滴带在身边，Y·P·Y·拉提亚斯乐于将所有的人变成任她操弄的玩偶，折磨之，欣赏之，丢弃之。当然，还有那早已如人偶一般，只知与她日夜巫山云雨，尽享鱼水之欢的兄长。\n\n她还记得曾经的自己吗？她还有机会变回曾经的自己吗？\n\n----------\n\n§0哦……亲爱的人类君，你玩够了没有？我们才见面没多久吧？你为何一直用你的小鼠标在我的身旁打转转啊？来吧人类君，到我的帷幔之中来……你会很-开-心-的-哦~§!"
 VNT_ypy_latios:0 "Y·P·Y·拉提奥斯"
 VNT_ypy_latios_desc:0 "拉提奥斯常常试图回忆自己失去自我的日子，却只能想起一些破碎的残片。只记得深夜时，自我意识会偶然闪回。他猛地坐起，看到熟睡在身旁的妹妹，月光从帘外溜入，仿佛一切变故从未发生。但每当他试图说什么或是做什么，就会瞬间被拉回那充满粉红色瘴气的，被自己的亲妹妹称作“理想乡”的梦魇之中。\n\n如今，虽已经找回了自我，但关于自己妹妹的事，拉提奥斯始终无法原谅自己。毕竟，拉提亚斯至今下落不明，水之都却时不时出现一批又一批的丧失心智者。神兽界和家族始终在试着宽慰他，年轻的守护神心中深深的烙印却已然成为他自己的地狱。“守护神的耻辱”，“没用的哥哥”，“和自己妹妹乱伦的畜生”，……，一合眼，这样的指责便从梦魇的深处爬出，藤蔓般缠绕着他的身体，洪水般灌满他的耳朵……随之而来的，是妹妹狰狞的脸庞，以及轻浮挑逗的姿态……在尖叫中醒来，在极度的疲倦中入睡，又在尖叫中醒来……但是到了白天，他依然想要尽到守护神的责任，努力隐瞒着夜间的苦痛，含着泪水打理水都的事务。实在忍不住时，他便飞到海边，把自己埋在温软的沙堆里痛哭流涕。清闲的日子，拉提奥斯也喜欢坐在海边，望着远方轻声抽泣。如果你怀着关怀或是悲悯的心，愿意让这年轻的小龙在你怀中尽情地哭一场，那就坐在他身边，将他拥入怀中吧，他不会拒绝的，兴许还会和你聊聊天。\n\n没有人知道拉提奥斯的前路如何，他自己也是。他的精神力还能维持多久？如果他再无法自持，又会发生什么？"
