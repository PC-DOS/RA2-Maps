 # Ideologies
 gestalt_autocrat:0 "格式塔专制主义"
 gestalt_autocrat_desc:0 "格式塔专制主义本身并不是一种“意识形态”或者“政治体制”，它只是一群失去心智者的共同意识。听从一个“主脑”的指挥。"
 southern_islands_liberalism:0 "南岛自由主义"
 southern_islands_liberalism_desc:0 "南岛自由主义在拉提奥斯与拉提亚斯的家族中已传承千年有余。总体来说，这是一种比较杂揉的意识形态：支持个体的自由，但同时又包含家族制度等威权成分。"
