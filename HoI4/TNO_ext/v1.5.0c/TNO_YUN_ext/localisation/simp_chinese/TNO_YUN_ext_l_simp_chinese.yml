 TNO_YUN_ext_JAP_YUN_puppet_despotism_party_long: "国民政府驻日戡乱委员会"
 TNO_YUN_ext_JAP_YUN_puppet_despotism_party: "国民政府驻日戡乱委员会"
 
 # Cosmetic tags
 TNO_YUN_ext_JAP_YUN_puppet:0 "中华民国驻日戡乱政府"
 TNO_YUN_ext_JAP_YUN_puppet_ADJ:0 "中华民国驻日戡乱政府"
 TNO_YUN_ext_JAP_YUN_puppet_ADF:0 "中华民国驻日戡乱政府"
 
 # Characters
 TNO_YUN_ext_JAP_YUN_puppet_occupied_gov:0 "中华民国日本特别行政区戡乱政府"
 TNO_YUN_ext_JAP_YUN_puppet_occupied_gov_desc:0 "抗日战争胜利后，中华民国对日本国进行军事占领。中华民国的占领区被命名为“中华民国日本特别行政区”，南京方面建立了戡乱政府对其进行管理。"
 
 # Decisions
 TNO_YUN_ext_decisions_category:0 "[YUN.GetFlag][YUN.GetName]扩展决议"
 TNO_YUN_ext_decisions_category_desc:0 "SCP基金会小马国分部的工具箱为原版TNO中的[YUN.GetFlag][YUN.GetName]准备的扩展决议。"
 TNO_YUN_ext_decisions_JAP_fate_separator:0 "[JAP.GetFlag][JAP.GetName]的命运"
 TNO_YUN_ext_decisions_JAP_fate_separator_desc:0 "随着[JAP.GetFlag][JAP.GetName]在战争中彻底战败，是时候清算它多年来对我国的罪行了。"
 TNO_YUN_ext_decisions_JAP_fate_rename_occupied_zone:0 "将[JAP.GetFlag][JAP.GetName]改名为$TNO_YUN_ext_JAP_YUN_puppet$"
 TNO_YUN_ext_decisions_JAP_fate_rename_occupied_zone_desc:0 "对于戕害我们同胞的豺狼，我们没有必要保留一丝的仁慈。因此，我们将对日本采取最为严苛的占领策略。日本原有的行政机构将被彻底摧毁，国民政府会派遣军官和行政人员在日本组建戡乱政府，实施军事管制。戡乱政府还将在日本建立特别军事法庭，对战犯进行搜捕和审判。日本现有的文化、经济、政治体系将被夷为平地，工业系统将被搬迁，“日本”的概念将在不久的未来被彻底抹去。"
 TNO_YUN_ext_decisions_JAP_fate_kick_JAPs_out_of_faction:0 "将[JAP.GetFlag][JAP.GetName]逐出我国阵营"
 TNO_YUN_ext_decisions_JAP_fate_kick_JAPs_out_of_faction_desc:0 "日本人与狗不得入内。"
 TNO_YUN_ext_decisions_JAP_fate_greate_purge:0 "彻底清洗日本军政体系"
 TNO_YUN_ext_decisions_JAP_fate_greate_purge_desc:0 "这个国家的军政已完全被腐化，每一个政客、军官、士兵，都是侵略中华、屠戮我国国民的罪人。没有仁慈的必要，他们在中国做的事，我们将千百倍奉还。\n特别军事法庭已经作出审判，所有日本军政人员——无论是所谓的“皇族”，还是政要、军官，抑或是普通的政府职员——一概格杀，不留活口。无论它们的党派为何，战争期间立场为何。"
 
 # Events
 # Execution of Hirohito
 TNO_YUN_ext_events_YUN_execution_of_hirohito.1.t:0 "[Get_newspaper_header]特别军事法庭对原日本天皇裕仁判处死刑立即执行"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.1.desc:0 "自中国军队占领日本，日本天皇裕仁便被罢黜，与其臣子一道成了阶下囚。随着一个又一个日本军政人士被判处死刑，各国民众逐渐将关注的目光移到了这个象征日本国家的人身上。今天，随着特别军事法庭的法槌落下，有关裕仁本人以及日本皇族命运的争论画上了句号。\n特别军事法庭认为，裕仁——以及整个日本皇族——作为日本当时的国家元首，对侵略战争犯有无可推卸的战争罪责。同时，裕仁默许了南京大屠杀等多场针对平民和战俘等的屠杀行动，朝香鸠彦等日本皇族成员甚至直接下达了对占领区进行扫荡的命令。因此，针对此等丧失人性之人，不杀不足以平民愤，不杀不足以报国仇。\n针对裕仁本人，特别军事法庭直接宣判其死刑并剥夺其上诉权利。执行方法最初拟定为绞刑或枪决，后改为凌迟刑，一种名义上已于清朝末年废除的刑罚。"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.1.a:0 "此人罪行罄竹难书，此次不过是现世报罢了"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.2.t:0 "[Get_newspaper_header]中国驻日占领军开始处决前日本皇族"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.2.desc:0 "根据中国驻日占领军建立的特别军事法庭的裁判，日本前天皇裕仁将被押赴中国执行死刑。\n南京大屠杀主犯朝香鸠彦被判处凌迟后斩首，由于是立即执行，不少中国军民高喊复仇口号，向其泼汽油、投掷火把、扔锐器，现场一度陷入混乱。根据现场记者的报导，朝香鸠彦“是被千刀万剐后活活烧死的”。巧合的是，这正是无数南京大屠杀遇难者临终前的遭遇。\n作为判决书的附则，中国针对日本皇族重启了中国传统的“连坐”制度，裕仁、朝香鸠彦等人的直系亲属全部被判处枪决或绞刑。其余仍在收押的日本皇族成员的命运则被一份集体死刑判决书定夺，他们在判决书下达时被成批地处死。"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.2.a:0 "此人罪行罄竹难书，此次不过是现世报罢了"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.3.t:0 "[Get_newspaper_header]中国特别军事法庭终结日本皇族"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.3.desc:0 "随着特别军事法庭的判决书送达各关押日本皇族的监狱，日本皇族所谓的“万世一系”于今日彻底终结。一个又一个的日本皇族——无论其性别、年龄、先前地位——被中国占领军士兵拖出监牢，或被一枪打穿头颅，或被机枪打成筛子，或被刺刀捅穿，或被斩下首级。层层堆叠的尸体或被军犬啃咬撕烂，或被浇上汽油酒精付之一炬。新出版的当地报纸上，这些影像被和日军在华的罪证照片一并刊印，配以带有中国特色的粗口，将日本皇族的尊严彻底砸烂、踩碎。很多无法接受信仰崩塌的日本军国分子选择了自杀，中国人则一边说笑一边把他们的尸体收集起来统一销毁。"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.3.a:0 "你若看到一窝虫豸，直接踩死便是"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.4.t:0 "[Get_newspaper_header]中国驻日占领军开始摧毁日本象征性建筑"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.4.desc:0 "在特别军事法庭裁定日本皇族命运的同时，中国驻日占领军开始执行来自中国首都的另一项命令。皇居、八纮一宇塔、靖国神社、伊势神宫等建筑被中国官方认定为“承载日本侵略历史”或“象征日本卑劣文化”的建筑被纵火或直接炸毁。\n至于被摧毁的建筑所在之地的命运，一名中国占领军高级军官表示，将参照杭州岳飞墓的形制，在这些地点建立日本战犯的跪像。这些雕像将面向中国，永远跪在地上，忏悔自己的罪行并被世间万人唾弃。"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.4.a:0 "青山有幸埋忠骨，白铁无辜铸佞臣"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.5.t:0 "[Get_newspaper_header]中国宣判日本文化死刑"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.5.desc:0 "在大量的日本地标性建筑成为废墟的同时，来自中国的学者成批入驻已被驻军接管的博物馆、图书馆、大学等文化设施进行清点登记工作，大量被认为“单纯代表卑劣文化”的文物、书籍等被直接销毁。一名具有中国官方背景的学者直言：“日本在中国沦陷区曾系统性地摧毁书籍和文物等中国文化载体，国立中央大学、南开大学等大学，及各地图书馆、博物馆亦因日寇轰炸或烧杀掳掠损失惨重。然日本文化本就大量借鉴中华文明，却行如此欺师灭祖之事。日本此等卑劣无耻之文化决无容许其传承之理由。”\n教育方面，根据中国驻日占领军发布的最新行政命令，日本将“没有进行大学教育的资格”，所有大学已停止运作并被军管，教员自行离职，学生自行退学。小学等初等教育机构也无限期休假，待中方重新拟定教育纲要。"
 TNO_YUN_ext_events_YUN_execution_of_hirohito.5.a:0 "多行不义必自毙"
 # Tokyo is Nanking
 TNO_YUN_ext_events_YUN_tokyo_is_nanking.1.t:0 "[Get_newspaper_header]特别军事法庭对日本军政人员宣判集体死刑"
 TNO_YUN_ext_events_YUN_tokyo_is_nanking.1.desc:0 "中国驻日特别军事法庭向全世界公报了一份令人震惊的判决书。这份判决书的对象是所有的日本军政人员，无论是普通士兵、政府职员，还是高级军官、国会议员或政府官员，均在判决所列生效对象之中。而判决一概是：死刑。无论这些人的立场、党派为何，在战争期间的行为或主张为何。一概格杀，不留活口。日本人惊恐地看到当年南京的活地狱景象正降临东京，或者说，每一座日本城市。\n中国占领军挨家挨户搜捕有从军或从政迹象的人，并现场进行处决。国会议事堂里，前议员或政要被机枪扫射成筛子。前日军军官被当街枪决后曝尸街头。"
 TNO_YUN_ext_events_YUN_tokyo_is_nanking.1.a:0 "以德报怨，何以报德？"
 TNO_YUN_ext_events_YUN_tokyo_is_nanking.2.t:0 "[Get_newspaper_header]中国驻日占领军暂停执行军事监督"
 TNO_YUN_ext_events_YUN_tokyo_is_nanking.2.desc:0 "令日本民众恐慌的命令终于到来了。在确保控制日本全境后，中国驻日占领军司令部下达了停止执行军事监督的命令——正如日军占领一座又一座中国城市时所做的那样。\n日本各地都成了中国军队的训练场。陆军用建筑物练习巷战，日本人成了练枪练刀的活靶子；海军击沉了他们能看到的每一艘日本船只，同时毫无顾忌地进行对地攻击演习；空军则将缴获的日军弹药“空投”到日本各地，或笑着将被捆成粽子的日本人直接从飞机上推下……\n医院也成了进行活体解剖和人体实验的研究所——与日本人在中国做过的一样。在部分地区，还建立了规模不同的关押日本人的模拟城镇，以便进行毒气或生化武器的实战测试，并在测试完毕后烧毁。\n显然，中国已经决心彻底摧毁这个岛国，只留下一片白地。"
 TNO_YUN_ext_events_YUN_tokyo_is_nanking.2.a:0 "东京，亦是，南京"
 # Fuck you JAPs
 TNO_YUN_ext_events_YUN_fuck_you_JAPs.1.t:0 "来自南京的电报"
 TNO_YUN_ext_events_YUN_fuck_you_JAPs.1.d:0 "国民政府驻日戡乱委员会敬启：\n\n贵部门近日之治理简报已收到，盼继续施行戡乱政策。进一步工作计划详见附文。\n\n谨祝顺利\n\n\n\n中华民国国民政府\n中华民国国防部日本军政监督局\n中华民国外交部亚洲司对日事务处"
 TNO_YUN_ext_events_YUN_fuck_you_JAPs.1.a:0 "电文已收"
 